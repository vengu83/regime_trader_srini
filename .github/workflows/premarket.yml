name: Pre-Market Research

on:
  schedule:
    - cron: '30 12 * * 1-5'   # 08:30 ET (UTC-4, EDT)
  workflow_dispatch:            # manual trigger from GitHub Actions UI

jobs:
  research:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Notify start
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python notify.py "[RegimeTrader] Pre-Market Research starting — $(date +%Y-%m-%d)"

      - name: Run Perplexity research
        env:
          ALPACA_API_KEY:     ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY:  ${{ secrets.ALPACA_SECRET_KEY }}
          ALPACA_BASE_URL:    https://paper-api.alpaca.markets
          PERPLEXITY_API_KEY: ${{ secrets.PERPLEXITY_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python scripts/research.py

      - name: Commit updated memory files
        run: |
          git config user.email "regimetrader@automated.ai"
          git config user.name  "RegimeTrader Bot"
          git add memory/
          git diff --cached --quiet || git commit -m "chore: pre-market research $(date +%Y-%m-%d)"
          git push origin main

      - name: Notify completion
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          SUMMARY=$(head -40 memory/market_research.md 2>/dev/null | tail -c 2000 || echo "Research complete")
          python notify.py "[RegimeTrader] Pre-Market Done ✅ $(date +%Y-%m-%d) — market_research.md updated on GitHub."

      - name: Notify on failure
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python notify.py "⚠️ [RegimeTrader] Pre-Market Research FAILED — check GitHub Actions logs."
