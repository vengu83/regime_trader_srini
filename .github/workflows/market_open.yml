name: Market Open Analysis

on:
  schedule:
    - cron: '35 13 * * 1-5'   # 09:35 ET (UTC-4, EDT)
  workflow_dispatch:

jobs:
  snapshot:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run regime snapshot and notify
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python scripts/snapshot.py "Market Open Analysis"

      - name: Commit updated regime insights
        run: |
          git config user.email "regimetrader@automated.ai"
          git config user.name  "RegimeTrader Bot"
          git add memory/regime_insights.md
          git diff --cached --quiet || git commit -m "chore: market-open snapshot $(date +%Y-%m-%d)"
          git push origin main

      - name: Notify on failure
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python notify.py "⚠️ [RegimeTrader] Market Open Analysis FAILED — check GitHub Actions logs."
